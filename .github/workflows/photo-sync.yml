name: Photo Sync
on:
  push:
    paths: ["photos/**"]
concurrency:
  group: photo-sync
  cancel-in-progress: true
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for uploads to settle
        run: sleep 15
      - name: Notify API
        run: |
          curl -sf -X POST https://api.i4tow.date/webhooks/photo-sync \
            -H "Content-Type: application/json" \
            -d '{"albumId":"cmo9o38me000ihqohxclr3lq7","token":"${{ secrets.I4TOW_SYNC_TOKEN }}"}'